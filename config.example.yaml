# Copy this file to my/config.yaml and edit the top block first.

# Main vacancy selection rules. Usually this is the only block you need to edit.
vacancies:
  # 1. Keywords for vacancy title search.
  # The script searches these words in vacancy names.
  keywords:
    - "php developer"
    - "backend developer"
    - "laravel developer"

  # Strict local filter after hh.ru search:
  # keep vacancy only if its title contains at least one of these words.
  # Leave empty [] to disable.
  required_title_words_any:
    - php
    - laravel
    - wordpress

  # 2. Do not take vacancies that were already processed successfully.
  # The history is stored in data/hh_auto_apply.sqlite3.
  skip_already_applied: true

  # 3. Stop words in vacancy titles.
  stop_words:
    - стажер
    - стажёр
    - intern
    - internship
    - junior
    - джуниор

  # 4. Only remote vacancies. This passes schedule=remote to hh.ru API
  # and also filters results by vacancy schedule.
  remote_only: true

search:
  # Advanced search settings. Usually do not edit.
  # 113 = Russia. Use an hh.ru area id if you want a specific region.
  area: 113
  per_page: 20
  max_pages: 1
  title_only: true
  order_by: publication_time
  period_days: 7

filters:
  skip_has_test: true
  exclude_company_keywords: []
  exclude_description_keywords: []

limits:
  max_applications_per_run: 5
  delay_between_applications_seconds: 12

letter:
  language: ru
  max_chars: 1200
  portfolio_url: ""
  # Optional editable prompt file. If missing, built-in defaults are used.
  prompt_path: my/cover_letter_prompt.md
  extra_instructions: |
    Пиши от первого лица, как senior/lead разработчик, который спокойно объясняет релевантность опыта.
    Не используй фразы "меня заинтересовала вакансия", "с большим интересом", "буду рад", "рассмотрите мою кандидатуру".
    Не делай письмо похожим на пересказ резюме.
    В первом смысловом предложении покажи конкретное совпадение с вакансией.
    Не выдумывай компании, должности, проекты, навыки, образование, сертификаты, курсы, метрики или цифры.

schedule:
  # Used by: python3 auto_apply.py --schedule --apply
  run_times:
    - "09:30"
    - "18:30"
