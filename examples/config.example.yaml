# Основные настройки поиска вакансий
vacancies:
  # Ключевые слова для поиска по названию вакансии
  keywords:
    - Менеджер ИТ
    - Руководитель ИТ
    - IT Manager
    - Менеджер по ИТ
    - ИТ Руководитель
    - Начальник ИТ отдела
    - Руководитель IT
    - Руководитель IT-департамента
    - Руководитель отдела IT
    - Начальник отдела информационных технологий
    - Начальник управления информационных технологий
    - Руководитель IT отдела
    - Начальник IT отдела

  # Обязательные слова в названии (локальный фильтр)
  # Вакансия пропускается, если в названии нет ни одного из этих слов
  required_title_words_any:
    - Руководитель
    - ИТ
    - Менеджер
    - Начальник
    - Manager

  # Стоп-слова - вакансии с этими словами в названии пропускаются
  stop_words:
    - стажер
    - стажёр
    - intern
    - internship
    - junior
    - джуниор

  # Только удаленная работа
  remote_only: false

  # Пропускать уже обработанные вакансии (история в БД)
  skip_already_applied: true

# Настройки поиска
search:
  area: 113  # 113 = Россия
  per_page: 20
  max_pages: 1
  title_only: true
  order_by: publication_time
  period_days: 7

# Дополнительные фильтры
filters:
  skip_has_test: true
  exclude_company_keywords: []
  exclude_description_keywords: []

# Лимиты
limits:
  max_applications_per_run: 10
  delay_between_applications_seconds: 12

# ОТВЕТЫ НА ВОПРОСЫ РАБОТОДАТЕЛЯ
# Скрипт ищет поля с ключевыми словами и заполняет их соответствующими ответами
application_questions:
  city: "Москва"
  salary_expectations: "от 270000 RUB"
  
  answers:
    # Вопрос 1: Количество проектов за 2-3 года
    - keywords:
        - "количество проектов"
        - "сколько проектов"
        - "общее количество"
        - "за последние"
        - "2-3 года"
        - "проектов над которыми"
        - "укажите общее количество"
      answer: "Более 15 крупных и средних проектов"
    
    # Вопрос 2: Предметные области проектов
    - keywords:
        - "предметные области"
        - "области проектов"
        - "над которыми работали"
        - "работали последние"
        - "перечислите предметные"
        - "предметные области проектов"
      answer: "Управление IT-инфраструктурой, автоматизация бизнес-процессов, внедрение и сопровождение 1С и CRM систем, информационная безопасность, бюджетирование и тендеры, миграция IT-сервисов в ЦОД, управление командами до 45+ сотрудников"
    
    # Вопрос 3: Проекты от старта до завершения
    - keywords:
        - "от старта до завершения"
        - "реализованы вами"
        - "сколько из этих"
        - "реализованы от старта"
        - "реализованы Вами от старта"
        - "старта до завершения"
      answer: "12 проектов реализовано от старта до завершения"
    
    # Вопрос 4: Проекты каскадным методом (waterfall)
    - keywords:
        - "каскадным методом"
        - "waterfall"
        - "каскадный метод"
        - "сколько waterfall"
        - "реализованы каскадным"
      answer: "8 проектов реализовано каскадным методом (waterfall)"
    
    # Вопрос 5: Желаемый уровень зарплаты
    - keywords:
        - "зарплат"
        - "зп"
        - "ожидания"
        - "доход"
        - "компенсац"
        - "уровень заработной"
        - "ежемесячных доход"
        - "заработной платы"
        - "желаемый уровень"
      answer: "от 270000 руб"
    
    # Город проживания
    - keywords:
        - "город"
        - "откуда"
        - "проживаете"
        - "проживания"
      answer: "Москва"
    
    # Дополнительный вопрос: средний бюджет проекта
    - keywords:
        - "бюджет проекта"
        - "средний бюджет"
        - "человеко-днях"
        - "диапазон"
        - "деньгах"
      answer: "Бюджеты проектов варьировались от 5 до 50 миллионов рублей, средний бюджет составлял 15-20 миллионов рублей"

# Настройки письма
letter:
  language: ru
  max_chars: 1200
  portfolio_url: ""
  prompt_path: my/cover_letter_prompt.md
  extra_instructions: |
    Пиши кратко и по делу.
    Используй факты из профиля кандидата.
    Не используй общие фразы.
    Не упоминай названия прошлых компаний.
    Акцент на управленческом опыте и достижениях.

# Расписание запусков
schedule:
  run_times:
    - "09:30"
    - "18:30"